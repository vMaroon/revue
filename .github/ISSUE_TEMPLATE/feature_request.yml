name: Feature request
description: Suggest an improvement to revue
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What review workflow is awkward today? Concrete over abstract.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed change
      description: What would you like revue to do instead?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
