<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Revue">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EE9E80"/>
      <stop offset="1" stop-color="#D66C48"/>
    </linearGradient>
    <clipPath id="lens"><circle cx="215" cy="215" r="104"/></clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>

  <!-- magnifier handle -->
  <line x1="300" y1="300" x2="410" y2="410" stroke="#5E3F2E" stroke-width="66" stroke-linecap="round"/>
  <line x1="300" y1="300" x2="410" y2="410" stroke="#FFFFFF" stroke-width="46" stroke-linecap="round"/>

  <!-- lens -->
  <circle cx="215" cy="215" r="122" fill="#FBFAF6" stroke="#5E3F2E" stroke-width="10"/>
  <g clip-path="url(#lens)">
    <rect x="150" y="176" width="150" height="34" rx="17" fill="#8FBE86"/>
    <rect x="150" y="230" width="118" height="34" rx="17" fill="#E7A491"/>
  </g>
  <circle cx="215" cy="215" r="122" fill="none" stroke="#FFFFFF" stroke-width="30"/>
  <circle cx="176" cy="176" r="20" fill="#FFFFFF" opacity="0.75"/>
</svg>
