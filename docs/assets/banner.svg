  <line x1="681" y1="230" x2="668" y2="245" stroke="#6B4A38" stroke-width="13" stroke-linecap="round"/>
  <circle cx="705" cy="205" r="33" fill="#FBFAF6"/>
  <g clip-path="url(#lens)">
