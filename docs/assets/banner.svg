<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="revue">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4EFE3"/>
      <stop offset="1" stop-color="#E9F1EA"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EE9E80"/>
      <stop offset="1" stop-color="#D66C48"/>
    </linearGradient>
    <clipPath id="lens"><circle cx="705" cy="205" r="33"/></clipPath>
    <g id="star">
      <path d="M0,-1 C0,-.25 .25,0 1,0 C.25,0 0,.25 0,1 C0,.25 -.25,0 -1,0 C-.25,0 0,-.25 0,-1 Z"/>
    </g>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- ambient background -->
  <g fill="#D8C4A9" opacity="0.75">
    <use href="#star" transform="translate(258,158) scale(20)"/>
    <use href="#star" transform="translate(198,332) scale(13)"/>
    <use href="#star" transform="translate(332,472) scale(11)"/>
    <use href="#star" transform="translate(738,150) scale(14)"/>
    <use href="#star" transform="translate(762,360) scale(12)"/>
    <use href="#star" transform="translate(1042,332) scale(16)"/>
    <use href="#star" transform="translate(152,432) scale(10)"/>
  </g>
  <g fill="none" stroke="#C6D6C2" stroke-width="3" opacity="0.7">
    <polygon points="615,88 636,100 636,124 615,136 594,124 594,100"/>
    <polygon points="1055,152 1081,167 1081,197 1055,212 1029,197 1029,167"/>
    <polygon points="182,222 200,232 200,254 182,264 164,254 164,232"/>
  </g>
  <g stroke="#B4D0B9" stroke-width="3" fill="#B4D0B9">
    <g opacity="0.8">
      <polyline points="978,402 1035,402 1058,379" fill="none"/>
      <circle cx="978" cy="402" r="5"/><circle cx="1058" cy="379" r="5"/>
      <polyline points="954,452 1006,452 1028,472" fill="none"/>
      <circle cx="954" cy="452" r="5"/><circle cx="1028" cy="472" r="5"/>
      <polyline points="150,300 120,300 102,282" fill="none"/>
      <circle cx="150" cy="300" r="5"/><circle cx="102" cy="282" r="5"/>
    </g>
  </g>
  <g opacity="0.85">
    <circle cx="250" cy="214" r="6" fill="#A9D3B4"/>
    <circle cx="762" cy="300" r="7" fill="#EC9578"/>
    <circle cx="905" cy="300" r="6" fill="#B49BDC"/>
    <circle cx="185" cy="376" r="5" fill="#EC9578"/>
    <circle cx="1060" cy="456" r="6" fill="#A9D3B4"/>
    <circle cx="700" cy="472" r="6" fill="#B49BDC"/>
    <circle cx="330" cy="150" r="5" fill="#A9D3B4"/>
  </g>

  <!-- platform -->
  <ellipse cx="470" cy="500" rx="86" ry="13" fill="#6B4A38" opacity="0.10"/>
  <rect x="255" y="486" width="430" height="40" rx="20" fill="#F5EEE1" stroke="#E6D8C3" stroke-width="3"/>
  <circle cx="300" cy="506" r="5" fill="#B49BDC"/>
  <circle cx="330" cy="510" r="4" fill="#A9D3B4"/>
  <circle cx="632" cy="508" r="5" fill="#EC9578"/>
  <circle cx="602" cy="511" r="4" fill="#A9D3B4"/>

  <!-- legs (behind body) -->
  <g stroke-linecap="round" fill="none">
    <path d="M440,470 L437,498" stroke="#6B4A38" stroke-width="28"/>
    <path d="M500,470 L505,498" stroke="#6B4A38" stroke-width="28"/>
    <path d="M440,470 L437,498" stroke="#DE7A55" stroke-width="19"/>
    <path d="M500,470 L505,498" stroke="#DE7A55" stroke-width="19"/>
  </g>

  <!-- arms (behind body) -->
  <g stroke-linecap="round" fill="none">
    <path d="M352,366 Q322,392 302,426" stroke="#6B4A38" stroke-width="27"/>
    <path d="M588,318 Q628,300 660,258" stroke="#6B4A38" stroke-width="27"/>
    <path d="M352,366 Q322,392 302,426" stroke="#DE7A55" stroke-width="18"/>
    <path d="M588,318 Q628,300 660,258" stroke="#DE7A55" stroke-width="18"/>
  </g>

  <!-- side ears -->
  <circle cx="348" cy="342" r="15" fill="#DE7A55" stroke="#6B4A38" stroke-width="5"/>
  <circle cx="592" cy="342" r="15" fill="#DE7A55" stroke="#6B4A38" stroke-width="5"/>

  <!-- body -->
  <rect x="345" y="212" width="250" height="268" rx="118" fill="url(#body)" stroke="#6B4A38" stroke-width="6"/>

  <!-- face plate -->
  <rect x="372" y="256" width="196" height="176" rx="74" fill="#F7E6D9" stroke="#6B4A38" stroke-width="3.5"/>

  <!-- eyes -->
  <ellipse cx="438" cy="330" rx="16" ry="22" fill="#48332A"/>
  <ellipse cx="502" cy="330" rx="16" ry="22" fill="#48332A"/>
  <circle cx="433" cy="322" r="7" fill="#ffffff"/>
  <circle cx="497" cy="322" r="7" fill="#ffffff"/>
  <circle cx="444" cy="336" r="3.2" fill="#ffffff"/>
  <circle cx="508" cy="336" r="3.2" fill="#ffffff"/>

