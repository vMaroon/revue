  <circle cx="705" cy="205" r="33" fill="none" stroke="#6B4A38" stroke-width="8"/>
  <circle cx="694" cy="194" r="6" fill="#ffffff" opacity="0.8"/>

  <!-- diff bubble under review -->
  <path d="M838,249 L826,276 L864,250 Z" fill="#FCF7ED" stroke="#6B4A38" stroke-width="4" stroke-linejoin="round"/>
  <rect x="792" y="118" width="214" height="132" rx="30" fill="#FCF7ED" stroke="#6B4A38" stroke-width="4"/>
  <rect x="826" y="142" width="150" height="13" rx="6.5" fill="#D9CDB8"/>
  <rect x="814" y="170" width="17" height="17" rx="4" fill="#8FBE86"/>
  <rect x="820" y="177" width="6" height="3" rx="1.5" fill="#ffffff"/>
  <rect x="821.5" y="173.5" width="3" height="10" rx="1.5" fill="#ffffff"/>
  <rect x="840" y="171" width="140" height="14" rx="7" fill="#9CC98A"/>
  <rect x="814" y="200" width="17" height="17" rx="4" fill="#E7A491"/>
  <rect x="820" y="207" width="6" height="3" rx="1.5" fill="#ffffff"/>
  <rect x="840" y="201" width="108" height="14" rx="7" fill="#EDB1A1"/>
</svg>
