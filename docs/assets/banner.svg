  <ellipse cx="436" cy="370" rx="14" ry="8" fill="#EF9E7E" opacity="0.55"/>
  <ellipse cx="504" cy="370" rx="14" ry="8" fill="#EF9E7E" opacity="0.55"/>
  <path d="M457,372 Q470,391 483,372 Q470,381 457,372 Z" fill="#48332A"/>

  <!-- antenna -->
  <path d="M470,214 Q463,186 474,168" stroke="#6B4A38" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="476" cy="160" r="11" fill="#DE7A55" stroke="#6B4A38" stroke-width="5"/>
  <g stroke="#B49BDC" stroke-width="5" stroke-linecap="round">
    <line x1="466" y1="132" x2="471" y2="143"/>
    <line x1="477" y1="127" x2="478" y2="140"/>
    <line x1="488" y1="133" x2="482" y2="143"/>
  </g>

  <!-- claws -->
  <g transform="translate(300,430) rotate(202)">
    <path d="M0,0 L24.5,-11.4 A27,27 0 1 0 24.5,11.4 Z" fill="#DE7A55" stroke="#6B4A38" stroke-width="5" stroke-linejoin="round"/>
  </g>
  <g transform="translate(664,254) rotate(-52)">
    <path d="M0,0 L24.5,-11.4 A27,27 0 1 0 24.5,11.4 Z" fill="#DE7A55" stroke="#6B4A38" stroke-width="5" stroke-linejoin="round"/>
  </g>

